services:
  zookeeper:
    image: zookeeper:3.7.2
    ports:
      - "2181:2181"
    environment:
      - ZOO_4LW_COMMANDS_WHITELIST=*
    networks:
      - nexus-network

  kafka:
    image: raulgracia/kafka:3.7.0-tiered-storage
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=0
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,BROKER://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,BROKER://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,BROKER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=BROKER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG4J_LOGGERS=io.aiven.kafka.tieredstorage=DEBUG
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=10000
      - KAFKA_REMOTE_LOG_STORAGE_SYSTEM_ENABLE=true
      - KAFKA_REMOTE_LOG_MANAGER_TASK_INTERVAL_MS=5000
      - KAFKA_REMOTE_LOG_METADATA_MANAGER_CLASS_NAME=org.apache.kafka.server.log.remote.metadata.storage.TopicBasedRemoteLogMetadataManager
      - KAFKA_REMOTE_LOG_METADATA_MANAGER_LISTENER_NAME=BROKER
      - KAFKA_RLMM_CONFIG_REMOTE_LOG_METADATA_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_REMOTE_LOG_STORAGE_MANAGER_CLASS_PATH=/tiered-storage-for-apache-kafka/core/*:/tiered-storage-for-apache-kafka/s3/*
      - KAFKA_REMOTE_LOG_STORAGE_MANAGER_CLASS_NAME=io.aiven.kafka.tieredstorage.RemoteStorageManager
      - KAFKA_RSM_CONFIG_CHUNK_SIZE=4194304
      - KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_CLASS=io.aiven.kafka.tieredstorage.fetch.cache.DiskChunkCache
      - KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_PATH=/home/appuser/kafka-tiered-storage-cache
      - KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_SIZE=1073741824
      - KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_PREFETCH_MAX_SIZE=16777216
      - KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_RETENTION_MS=600000
      - KAFKA_RSM_CONFIG_CUSTOM_METADATA_FIELDS_INCLUDE=REMOTE_SIZE
      - KAFKA_RSM_CONFIG_STORAGE_BACKEND_CLASS=io.aiven.kafka.tieredstorage.storage.s3.S3Storage
      - KAFKA_RSM_CONFIG_STORAGE_S3_ENDPOINT_URL=http://nexus:8181
      - KAFKA_RSM_CONFIG_STORAGE_S3_BUCKET_NAME=test-metadata
      - KAFKA_RSM_CONFIG_STORAGE_S3_REGION=us-east-1
      - KAFKA_RSM_CONFIG_STORAGE_S3_PATH_STYLE_ACCESS_ENABLED=true
      - KAFKA_RSM_CONFIG_STORAGE_AWS_ACCESS_KEY_ID=dev-identity
      - KAFKA_RSM_CONFIG_STORAGE_AWS_SECRET_ACCESS_KEY=dev-credential
      - KAFKA_LOG_SEGMENT_BYTES=10485760
      - KAFKA_METADATA_LOG_SEGMENT_BYTES=10485760
      - S3PROXY_ENDPOINT=http://nexus:8181
    depends_on:
      - zookeeper
    networks:
      - nexus-network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexus-network

  minio:
    image: quay.io/minio/minio:latest
    environment:
      - MINIO_ROOT_USER=dev-identity
      - MINIO_ROOT_PASSWORD=dev-credential
    volumes:
      - minio-data:/data
      - ./init_minio.sh:/init_minio.sh
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - nexus-network

  nexus:
    image: hossamelghamry/nexus-tiered-stream-manager:latest
    ports:
      - "8181:8181"
      - "8080:8080"
    environment:
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379

      # S3Proxy Configuration
      - S3PROXY_IDENTITY=dev-identity
      - S3PROXY_CREDENTIAL=dev-credential
      - S3PROXY_ENDPOINT=http://0.0.0.0:8181
      - LOG_LEVEL=info
      - S3PROXY_AUTHORIZATION=none
      - S3PROXY_VIRTUALHOST=
      - S3PROXY_KEYSTORE_PATH=keystore.jks
      - S3PROXY_KEYSTORE_PASSWORD=password
      - S3PROXY_CORS_ALLOW_ALL=false
      - S3PROXY_CORS_ALLOW_ORIGINS=
      - S3PROXY_CORS_ALLOW_METHODS=
      - S3PROXY_CORS_ALLOW_HEADERS=
      - S3PROXY_CORS_ALLOW_CREDENTIAL=
      - S3PROXY_IGNORE_UNKNOWN_HEADERS=true
      - S3PROXY_ENCRYPTED_BLOBSTORE=
      - S3PROXY_ENCRYPTED_BLOBSTORE_PASSWORD=
      - S3PROXY_ENCRYPTED_BLOBSTORE_SALT=
      - S3PROXY_READ_ONLY_BLOBSTORE=false

      # JClouds Configuration
      - JCLOUDS_PROVIDER=s3
      - JCLOUDS_IDENTITY=dev-identity
      - JCLOUDS_CREDENTIAL=dev-credential
      - JCLOUDS_ENDPOINT=http://minio:9000
      - JCLOUDS_FILESYSTEM_BASEDIR=/tmp/blobstore
      - JCLOUDS_REGION=
      - JCLOUDS_REGIONS=us-east-1
      - JCLOUDS_KEYSTONE_VERSION=
      - JCLOUDS_KEYSTONE_SCOPE=
      - JCLOUDS_KEYSTONE_PROJECT_DOMAIN_NAME=
    depends_on:
      - redis
      - minio
    networks:
      - nexus-network

  kafka-client:
    image: confluentinc/cp-kafka
    command: ["sleep", "infinity"]
    networks:
      - nexus-network
    depends_on:
      - kafka

networks:
  nexus-network:

volumes:
  minio-data:
  redis-data:
