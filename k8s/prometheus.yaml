apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: nexus-ns
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nexus-ns
  labels:
    app: prometheus
data:
  prometheus.yml: |
    scrape_configs:
      - job_name: "prometheus"
        metrics_path: "/metrics"
        scrape_interval: 10s
        static_configs:
          - targets: ["prometheus-svc:9090"]

      - job_name: "Nexus Metrics"
        metrics_path: "/metrics"
        scrape_interval: 2s
        basic_auth:
          username: admin
          password: admin
        scheme: http
        static_configs:
          - targets: ["nexus-svc:8080"]
            labels:
              application: "Nexus"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-deployment
  namespace: nexus-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config
