#S3Proxy Configuration
s3proxy.identity=identity
s3proxy.credential=credential
s3proxy.endpoint=http://0.0.0.0:8181

#JClouds Configuration
jclouds.provider=filesystem
jclouds.identity=identity
jclouds.credential=filesystem
jclouds.filesystembasedir=/tmp/blobstore
jclouds.endpoint=http://localhost

#Redis Configuration
redis.host=localhost
redis.port=6379

#Micrometer Configuration
management.defaults.metrics.export.enabled=true
management.prometheus.metrics.export.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

#HTTP Server
webserver.port=8080
